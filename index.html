<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>설비 레이아웃 점검</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--bg:#f0f2f5;--card:#fff;--ok:#2e7d32;--ok-bg:#e8f5e9;--ng:#c62828;--ng-bg:#ffebee;--part:#f57f17;--part-bg:#fffde7;--bdr:#e0e0e0;--b:#1565c0;--b-lt:#e3f2fd}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:#212121;font-size:14px;overflow-x:hidden;padding-bottom:12px}
    .hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .hdr-top{display:flex;align-items:center;justify-content:space-between}.hdr h1{font-size:16px;font-weight:700}
    .hdr-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;font-size:12px}
    .hdr-meta input,.hdr-meta select{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 6px;border-radius:4px;font-size:12px;font-family:inherit}
    .hdr-meta select option{color:#333;background:#fff}
    .prog-w{background:rgba(255,255,255,.2);height:3px;border-radius:2px;margin-top:6px}.prog-f{height:100%;background:#69f0ae;border-radius:2px;transition:width .3s}
    .sum-bar{display:flex;gap:4px;padding:6px 10px;background:var(--card);border-bottom:1px solid var(--bdr);overflow-x:auto}
    .sc{flex:1;min-width:48px;text-align:center;padding:5px 2px;border-radius:8px;font-size:10px;font-weight:600}
    .sc-total{background:#e8eaf6;color:#283593}.sc-done{background:var(--ok-bg);color:var(--ok)}.sc-part{background:var(--part-bg);color:var(--part)}.sc-ng{background:var(--ng-bg);color:var(--ng)}.sc-rem{background:#f5f5f5;color:#777}
    .sc-v{font-size:18px;display:block;margin-top:1px;font-weight:700}
    .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--bdr);position:sticky;top:73px;z-index:90;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tab{flex-shrink:0;padding:8px 10px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
    .tab.active{border-bottom-color:var(--b);color:var(--b)}
    .tab .bdg{font-size:9px;padding:1px 4px;border-radius:8px;margin-left:1px;font-weight:700;background:var(--b-lt);color:var(--b)}
    .pnl{padding:10px 12px;display:none}.pnl.active{display:block}
    .lw{background:var(--card);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:10px;overflow:auto;-webkit-overflow-scrolling:touch}
    .lt{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}.lt .dot{width:8px;height:8px;border-radius:50%;background:var(--b)}
    .lm{position:relative;margin:0 auto}
    .eq,.grid-eq{cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:600;line-height:1.15;border:2px solid;text-align:center;-webkit-user-select:none;user-select:none}
    .eq{position:absolute;border-radius:4px;overflow:hidden;z-index:1}.eq .en{font-weight:700}.eq .ei{opacity:.8}.eq .ed{margin-top:1px;padding:1px 3px;border-radius:2px;background:rgba(255,255,255,.92);color:#333;white-space:nowrap}
    .grid-eq{border-radius:8px;padding:12px 8px;min-height:60px}.grid-eq .en{font-size:14px;font-weight:700}.grid-eq .ei{font-size:11px;opacity:.8;margin-top:2px}.grid-eq .ed{font-size:10px;margin-top:3px;padding:1px 4px;border-radius:3px;background:rgba(255,255,255,.92);color:#333}
    .unc{background:#f5f5f5;border-color:#bbb;color:#777}
    .aok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);box-shadow:0 1px 4px rgba(46,125,50,.2)}
    .hng{background:var(--ng-bg);border-color:var(--ng);color:var(--ng);animation:png 2s infinite}
    .prt{background:var(--part-bg);border-color:var(--part);color:var(--part);box-shadow:0 1px 4px rgba(245,127,23,.2)}
    @keyframes png{0%,100%{box-shadow:0 1px 4px rgba(198,40,40,.3)}50%{box-shadow:0 2px 12px rgba(198,40,40,.5)}}
    .grid-map{display:grid;gap:8px;padding:4px}
    .legend{display:flex;gap:8px;margin-top:8px;font-size:10px;color:#888;justify-content:center;flex-wrap:wrap}
    .lg-i{display:flex;align-items:center;gap:3px}.lg-d{width:11px;height:11px;border-radius:3px;border:2px solid}
    .lu{background:#f5f5f5;border-color:#bbb}.lo{background:var(--ok-bg);border-color:var(--ok)}.ln{background:var(--ng-bg);border-color:var(--ng)}.lp{background:var(--part-bg);border-color:var(--part)}
    .lg-hint{font-size:10px;color:#aaa;text-align:center;margin-top:4px}
    /* 모달 */
    .mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center}
    .mo.show{display:flex;animation:fi .15s}@keyframes fi{from{opacity:0}}
    .ms{background:#fff;width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:85vh;overflow-y:auto;animation:su .25s}@keyframes su{from{transform:translateY(100%)}}
    .mbar{width:36px;height:4px;background:#ccc;border-radius:2px;margin:10px auto 0}
    .mhd{padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #eee}
    .mbdg{width:44px;height:44px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}.mbdg .mn2{font-size:17px}.mbdg .mt2{font-size:9px;opacity:.85}
    .minfo{flex:1}.minfo h3{font-size:15px;font-weight:700}.minfo p{font-size:12px;color:#888}
    .m-close{width:36px;height:36px;border:none;border-radius:50%;background:#f5f5f5;font-size:18px;cursor:pointer;color:#666;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .mcl{padding:6px 16px 14px}
    .mci{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f5f5f5}.mci:last-child{border-bottom:none}
    .mci-l{font-size:14px;font-weight:500}.mcb{display:flex;gap:6px}
    .ckb{padding:7px 16px;border-radius:8px;border:2px solid;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;min-width:48px}
    .ckb.ok{border-color:#c8e6c9;background:#fff;color:#66bb6a}.ckb.ok.on{background:var(--ok);color:#fff;border-color:var(--ok)}
    .ckb.ng{border-color:#ffcdd2;background:#fff;color:#ef5350}.ckb.ng.on{background:var(--ng);color:#fff;border-color:var(--ng)}
    .mft{padding:8px 16px 24px;display:flex;gap:8px}.mft button{flex:1;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
    .b-aok{background:var(--ok-bg);color:var(--ok);border:1.5px solid #a5d6a7}.b-sv{background:#1a237e;color:#fff}
    .nr{display:none;padding:3px 0 0}.nr.show{display:block}
    .nr input{width:100%;padding:6px 10px;border:1.5px solid #ffcdd2;border-radius:6px;font-size:13px;font-family:inherit;background:#fff5f5}
    .ng-photo-row{display:none;padding:6px 0 0}.ng-photo-row.show{display:block}
    .ng-photo-row label{font-size:11px;color:#888;display:block;margin-bottom:4px}
    .photo-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border:1.5px dashed #ffcdd2;border-radius:6px;background:#fff5f5;color:var(--ng);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
    .photo-thumb{width:60px;height:60px;border-radius:6px;object-fit:cover;border:1px solid #ddd;margin-top:4px;cursor:pointer}
    .mci-text{padding:11px 0;border-bottom:1px solid #f5f5f5}.mci-text:last-child{border-bottom:none}
    .mci-text .mci-l{font-size:14px;font-weight:500;margin-bottom:6px}
    .mci-text textarea{width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;min-height:48px;background:#fafbfc}
    /* NG이력 모달 */
    .ng-hist-item{padding:10px 0;border-bottom:1px solid #f0f0f0}.ng-hist-item:last-child{border-bottom:none}
    .nhi-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}.nhi-at{color:#999}.nhi-items{font-size:12px;color:var(--ng);font-weight:500}.nhi-reason{font-size:11px;color:#666;margin-top:2px}
    .nhi-photos{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}.nhi-photos img{width:56px;height:56px;border-radius:6px;object-fit:cover;border:1px solid #ddd;cursor:pointer}
    .nhi-status{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;margin-top:4px}.nhi-status.open{background:var(--ng-bg);color:var(--ng)}.nhi-status.closed{background:var(--ok-bg);color:var(--ok)}
    .ng-empty{text-align:center;padding:20px;color:#aaa;font-size:13px}
    .improve-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:1.5px solid #a5d6a7;border-radius:6px;background:var(--ok-bg);color:var(--ok);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
    .photo-viewer{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;cursor:pointer}.photo-viewer.show{display:flex}.photo-viewer img{max-width:95%;max-height:90%;border-radius:8px}
    /* 이력 */
    .hcard{background:var(--card);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:14px;margin-bottom:10px}
    .htit{font-size:14px;font-weight:700;margin-bottom:10px}.hempty{text-align:center;padding:20px;color:#aaa;font-size:13px}
    .hitm{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}.hitm:last-child{border-bottom:none}
    .hbdg{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;flex-shrink:0}
    .hdet{flex:1;min-width:0}.hdet .ht2{display:flex;justify-content:space-between;align-items:center}.hdet .heq{font-weight:600;font-size:12px}.hdet .htm{font-size:10px;color:#999}
    .hdet .hr{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
    .hchip{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600}.hchip.ok{background:var(--ok-bg);color:var(--ok)}.hchip.ng{background:var(--ng-bg);color:var(--ng)}.hchip.txt{background:var(--b-lt);color:var(--b)}
    .hinsp{font-size:10px;color:#888;margin-top:2px}
    .h-acts{display:flex;gap:4px;margin-top:4px}.h-acts button{padding:3px 8px;border:none;border-radius:4px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer}
    .ha-edit{background:var(--b-lt);color:var(--b)}.ha-del{background:var(--ng-bg);color:var(--ng)}
    .h-clr-tag{font-size:9px;padding:1px 5px;border-radius:3px;background:#e0e0e0;color:#777;margin-left:4px}
    .h-divider{padding:6px 0;font-size:11px;color:#999;border-bottom:1px dashed #ddd;margin:4px 0;font-weight:600}
    /* 설정 */
    .scard{background:var(--card);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:14px;margin-bottom:10px}
    .stit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .sitm{display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:13px}.sitm:last-child{border-bottom:none}
    .sitm input{flex:1;padding:6px 8px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;min-width:0}
    .sitm select{padding:5px 2px;border:1.5px solid #ddd;border-radius:6px;font-size:11px;font-family:inherit;background:#fff}
    .s-move{width:26px;height:26px;border:none;border-radius:4px;background:#f5f5f5;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#888}
    .s-move:active{background:#e0e0e0}
    .s-del{width:26px;height:26px;border:none;border-radius:4px;background:#ffebee;color:var(--ng);font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .s-add-row{display:flex;gap:6px;margin-top:8px}.s-add-row button{flex:1;padding:8px;border:2px dashed #ccc;border-radius:8px;background:none;font-size:12px;font-weight:600;color:#999;cursor:pointer;font-family:inherit}
    .s-btns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}.s-btns button{flex:1;min-width:60px;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
    .sb-save{background:var(--b);color:#fff}.sb-load{background:#f5f5f5;color:#555;border:1.5px solid #ddd}
    .sb-export{background:var(--ok-bg);color:var(--ok);border:1.5px solid #a5d6a7}.sb-import{background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80}
    input[type=file]{display:none}
    /* 구역 설정 - 설비목록 서브 */
    .zone-equip-list{margin-top:6px;padding:6px 8px;background:#fafbfc;border-radius:6px;font-size:12px;max-height:120px;overflow-y:auto}
    .ze-item{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid #eee}.ze-item:last-child{border-bottom:none}
    .ze-item input{flex:1;padding:4px 6px;border:1px solid #ddd;border-radius:4px;font-size:12px;font-family:inherit;min-width:0}
    .ze-add{padding:4px 8px;border:1px dashed #ccc;border-radius:4px;background:none;font-size:11px;color:#999;cursor:pointer;margin-top:4px;font-family:inherit;width:100%}
    .zone-toggle{font-size:11px;color:var(--b);cursor:pointer;margin-left:auto;font-weight:600}
    .action-bar{display:flex;gap:6px;padding:6px 10px;background:var(--card);border-bottom:1px solid var(--bdr)}
    .action-bar button{flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
    .ab-reset{background:#fff;color:var(--ng);border:1.5px solid #ffcdd2;flex:0.5}
    .ab-dl{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;box-shadow:0 1px 4px rgba(27,94,32,.2)}
    .ab-dl:disabled{background:#bbb;box-shadow:none}
    .ab-ng{background:linear-gradient(135deg,#b71c1c,#d32f2f);color:#fff;box-shadow:0 1px 4px rgba(183,28,28,.2);flex:0.7}
    .reset-info{text-align:center;padding:4px 12px;font-size:11px;color:#999;background:var(--card);border-bottom:1px solid var(--bdr)}
  </style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top"><h1>🏭 설비 레이아웃 점검</h1><span id="cntTxt" style="font-size:12px;opacity:.8"></span></div>
  <div class="hdr-meta"><input type="date" id="chkDate"><input type="time" id="chkTime"><select id="insp"></select></div>
  <div class="prog-w"><div class="prog-f" id="progBar"></div></div>
</div>
<div id="resetInfo" class="reset-info" style="display:none"></div>
<div class="sum-bar">
  <div class="sc sc-total">전체<span class="sc-v" id="smT"></span></div>
  <div class="sc sc-done">완료<span class="sc-v" id="smD">0</span></div>
  <div class="sc sc-part">부분<span class="sc-v" id="smP">0</span></div>
  <div class="sc sc-ng">NG<span class="sc-v" id="smN">0</span></div>
  <div class="sc sc-rem">미점검<span class="sc-v" id="smR"></span></div>
</div>
<div class="action-bar"><button class="ab-reset" onclick="resetAll()">🔄 해제</button><button class="ab-dl" id="dlBtn" onclick="downloadXlsx()" disabled>📥 엑셀</button><button class="ab-ng" onclick="downloadNgReport()">📋 NG레포트</button></div>
<div class="tabs" id="tabBar"></div>
<div id="panels"></div>
<div class="pnl" id="layH"><div class="hcard"><div class="htit">📋 점검 이력</div><div id="histList"><div class="hempty">아직 점검 이력이 없습니다</div></div><div style="display:flex;gap:6px;margin-top:10px"><button onclick="clearAllHist()" style="flex:1;padding:8px;border:1.5px solid #ffcdd2;border-radius:8px;background:#fff;color:var(--ng);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">🗑 전체 이력 삭제</button><button onclick="clearAllNgRpt()" style="flex:1;padding:8px;border:1.5px solid #ffcdd2;border-radius:8px;background:#fff;color:var(--ng);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">🗑 전체 NG레포트 삭제</button></div></div></div>
<div class="pnl" id="layS">
  <div class="scard"><div class="stit">🔧 점검항목</div><div id="ciEditor"></div><div class="s-add-row"><button onclick="addCI('check')">+ OK/NG</button><button onclick="addCI('text')">+ 수기</button></div><div class="s-btns"><button class="sb-save" onclick="saveCI()">적용</button><button class="sb-load" onclick="resetCI()">기본값</button></div><div class="s-btns" style="margin-top:4px"><button class="sb-export" onclick="exportCI()">TXT저장</button><button class="sb-import" onclick="document.getElementById('ciFile').click()">TXT불러오기</button><input type="file" id="ciFile" accept=".txt" onchange="importCI(event)"></div></div>
  <div class="scard"><div class="stit">🏭 점검구역</div><div id="zoneEditor"></div><div class="s-add-row"><button onclick="addZone()">+ 구역 추가</button></div><div class="s-btns"><button class="sb-save" onclick="saveZones()">적용 (새로고침)</button><button class="sb-load" onclick="resetZones()">기본값</button></div></div>
  <div class="scard"><div class="stit">👤 점검자</div><div id="inspEditor"></div><div style="margin-top:6px"><button onclick="addInsp()" style="width:100%;padding:8px;border:2px dashed #ccc;border-radius:8px;background:none;font-size:12px;font-weight:600;color:#999;cursor:pointer;font-family:inherit">+ 추가</button></div><div class="s-btns"><button class="sb-save" onclick="saveInsp()">적용</button><button class="sb-load" onclick="resetInsp()">기본값</button></div><div class="s-btns" style="margin-top:4px"><button class="sb-export" onclick="exportInsp()">TXT저장</button><button class="sb-import" onclick="document.getElementById('inspFile').click()">TXT불러오기</button><input type="file" id="inspFile" accept=".txt" onchange="importInsp(event)"></div></div>
</div>
<!-- 모달 아래 빈 공간 불필요하므로 제거 -->
<!-- 점검 모달 -->
<div class="mo" id="chkMo"><div class="ms"><div class="mbar"></div><div class="mhd"><div class="mbdg" id="moBdg"><span class="mn2" id="moNo"></span><span class="mt2" id="moTon"></span></div><div class="minfo"><h3 id="moTit"></h3><p id="moSub"></p></div><button class="m-close" onclick="closeMo()">✕</button></div><div class="mcl" id="chkList"></div><div class="mft"><button class="b-aok" onclick="moAllOk()">전체 OK</button><button class="b-sv" onclick="moSave()">저장</button></div></div></div>
<!-- NG이력 모달 -->
<div class="mo" id="ngMo"><div class="ms"><div class="mbar"></div><div class="mhd"><div class="mbdg" id="ngBdg" style="background:var(--ng)"><span class="mn2" id="ngNo"></span><span class="mt2">NG</span></div><div class="minfo"><h3 id="ngTit">NG 이력</h3><p id="ngSub"></p></div><button class="m-close" onclick="closeNgMo()">✕</button></div><div class="mcl" id="ngList"></div></div></div>
<div class="photo-viewer" id="photoViewer" onclick="this.classList.remove('show')"><img id="pvImg"></div>
<input type="file" id="camInput" accept="image/*" capture="environment" style="display:none">
<script>
// ===== 기본 구역 데이터 =====
const DEFAULT_ZONES=[

// 로드
let ZONES=JSON.parse(localStorage.getItem('ZONES')||'null')||JSON.parse(JSON.stringify(DEFAULT_ZONES));
let CI=(JSON.parse(localStorage.getItem('CI')||'null')||JSON.parse(JSON.stringify(DEFAULT_CI))).map(i=>({...i,tp:i.tp||'check'}));
let INSP=JSON.parse(localStorage.getItem('INSP')||'null')||[...DEFAULT_INSP];
let res=JSON.parse(localStorage.getItem('RES')||'{}');
let hist=JSON.parse(localStorage.getItem('HIST')||'[]');
let ngReports=JSON.parse(localStorage.getItem('NG_RPT')||'{}');
let clearTime=localStorage.getItem('CLR_TIME')||null;
let curKey=null,mChk={},editIdx=-1,longTimer=null,longFired=false,camResolve=null;
let activeTab=null;

function persist(){localStorage.setItem('RES',JSON.stringify(res));localStorage.setItem('HIST',JSON.stringify(hist))}
function persistNg(){localStorage.setItem('NG_RPT',JSON.stringify(ngReports))}
function checkItems(){return CI.filter(i=>i.tp==='check')}
function textItems(){return CI.filter(i=>i.tp==='text')}
function isActive(r){if(!r||!r.ts)return false;if(!clearTime)return true;return r.ts>clearTime}
function getStatus(r){if(!isActive(r))return'unc';const c=checkItems(),f=c.filter(i=>r[i.id]==='OK'||r[i.id]==='NG');if(!f.length)return'unc';if(c.some(i=>r[i.id]==='NG'))return'hng';if(f.length<c.length)return'prt';return'aok'}
function totalEquip(){let t=0;ZONES.forEach(z=>t+=z.equip.length);return t}
function allKeys(){const k=[];ZONES.forEach(z=>z.equip.forEach(e=>k.push(z.id+'-'+e.no)));return k}

// ===== 동적 UI 빌드 =====
function buildUI(){
  // 탭
  const tb=document.getElementById('tabBar');tb.innerHTML='';
  ZONES.forEach((z,i)=>{const t=document.createElement('div');t.className='tab'+(i===0?' active':'');t.id='tab_'+z.id;t.onclick=()=>swTab(z.id);t.innerHTML=`${z.name}<span class="bdg" id="bdg_${z.id}">0/${z.equip.length}</span>`;tb.appendChild(t)});
  // 이력, 설정 탭
  ['H','S'].forEach(id=>{const t=document.createElement('div');t.className='tab';t.id='tab_'+id;t.onclick=()=>swTab(id);t.textContent=id==='H'?'이력':'⚙';tb.appendChild(t)});
  // 패널
  const pp=document.getElementById('panels');pp.innerHTML='';
  ZONES.forEach((z,i)=>{
    const p=document.createElement('div');p.className='pnl'+(i===0?' active':'');p.id='lay_'+z.id;
    const legendHtml=`<div class="legend"><div class="lg-i"><div class="lg-d lu"></div>미점검</div><div class="lg-i"><div class="lg-d lo"></div>완료</div><div class="lg-i"><div class="lg-d lp"></div>부분</div><div class="lg-i"><div class="lg-d ln"></div>NG</div></div><div class="lg-hint">길게 누르면 NG 이력 조회</div>`;
    if(z.type==='map'){
      p.innerHTML=`<div class="lw"><div class="lt"><span class="dot"></span>${z.name} (${z.equip.length}대)</div><div class="lm" id="map_${z.id}"></div></div>${legendHtml}`;
    }else{
      p.innerHTML=`<div class="lw"><div class="lt"><span class="dot"></span>${z.name} (${z.equip.length}개소)</div><div class="grid-map" id="map_${z.id}" style="grid-template-columns:repeat(${z.cols||3},1fr)"></div></div>${legendHtml}`;
    }
    pp.appendChild(p);
  });
  activeTab=ZONES.length?ZONES[0].id:null;
  // 렌더 맵
  ZONES.forEach(z=>{if(z.type==='map')renderMap(z);else renderGrid(z)});
}

function renderMap(z){
  const c=document.getElementById('map_'+z.id);if(!c)return;c.innerHTML='';const list=z.equip;
  if(!list.length)return;
  let mx=0,my=0;list.forEach(e=>{mx=Math.max(mx,(e.x||0)+(e.w||60));my=Math.max(my,(e.y||0)+(e.h||60))});
  const pad=10,aw=Math.min(window.innerWidth-44,420),sc=aw/(mx+pad*2),mh=(my+pad*2)*sc;
  c.style.width=aw+'px';c.style.height=mh+'px';
  list.forEach(e=>{
    const k=z.id+'-'+e.no,r=res[k],st=getStatus(r),d=document.createElement('div');
    d.className='eq '+st;d.id='eq-'+k;
    d.style.cssText=`left:${((e.x||0)+pad)*sc}px;top:${((e.y||0)+pad)*sc}px;width:${(e.w||60)*sc}px;height:${(e.h||60)*sc}px;touch-action:none`;
    const fs=Math.max(7,Math.min(12,(e.w||60)*sc/5));d.style.fontSize=fs+'px';
    let dtT='',dtS='none';if(isActive(r)&&r.at){dtT=r.at.split(' ')[1];dtS='block'}
    d.innerHTML=`<span class="en" style="font-size:${Math.min(14,fs+2)}px">${e.no}</span><span class="ei">${e.t?e.t+'t':''}</span><span class="ed" id="dt-${k}" style="display:${dtS};font-size:${Math.max(6,fs-2)}px">${dtT}</span>`;
    bindLP(d,z.id,e);c.appendChild(d);
  });
}
function renderGrid(z){
  const c=document.getElementById('map_'+z.id);if(!c)return;c.innerHTML='';
  z.equip.forEach(e=>{
    const k=z.id+'-'+e.no,r=res[k],st=getStatus(r),d=document.createElement('div');
    d.className='grid-eq '+st;d.id='eq-'+k;d.style.touchAction='none';
    let dtT='',dtS='none';if(isActive(r)&&r.at){dtT=r.at.split(' ')[1];dtS='block'}
    d.innerHTML=`<span class="en">${e.no}</span>${e.t?'<span class="ei">'+e.t+'t</span>':''}<span class="ed" id="dt-${k}" style="display:${dtS}">${dtT}</span>`;
    bindLP(d,z.id,e);c.appendChild(d);
  });
}

function bindLP(el,zid,eq){
  el.addEventListener('pointerdown',()=>{longFired=false;longTimer=setTimeout(()=>{longFired=true;openNgHist(zid,eq)},600)});
  el.addEventListener('pointerup',()=>{clearTimeout(longTimer)});
  el.addEventListener('pointerleave',()=>{clearTimeout(longTimer)});
  el.addEventListener('pointercancel',()=>{clearTimeout(longTimer)});
  el.onclick=()=>{if(!longFired){editIdx=-1;openMo(zid,eq)}};
}

function swTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pnl').forEach(x=>x.classList.remove('active'));
  const tab=document.getElementById('tab_'+t);if(tab)tab.classList.add('active');
  if(t==='H'){document.getElementById('layH').classList.add('active');renderHist()}
  else if(t==='S'){document.getElementById('layS').classList.add('active')}
  else{const p=document.getElementById('lay_'+t);if(p)p.classList.add('active')}
  activeTab=t;
}

// ===== 카메라 =====
function takePhoto(){return new Promise(r=>{camResolve=r;document.getElementById('camInput').click()})}
document.getElementById('camInput').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f){if(camResolve)camResolve(null);return}
  const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>{const max=800;let w=img.width,h=img.height;if(w>max||h>max){if(w>h){h=h*max/w;w=max}else{w=w*max/h;h=max}}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);if(camResolve)camResolve(cv.toDataURL('image/jpeg',0.7));camResolve=null};img.src=ev.target.result};reader.readAsDataURL(f);e.target.value=''});
function viewPhoto(s){document.getElementById('pvImg').src=s;document.getElementById('photoViewer').classList.add('show')}
function renderInspSel(){const s=document.getElementById('insp'),p=s.value;s.innerHTML='<option value="" disabled selected>점검자</option>';INSP.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;s.appendChild(o)});if(p&&INSP.includes(p))s.value=p}

function init(){
  const n=new Date();document.getElementById('chkDate').value=n.toISOString().split('T')[0];
  document.getElementById('chkTime').value=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  renderInspSel();buildUI();renderCIEditor();renderZoneEditor();renderInspEditor();updSummary();showClearInfo();
}

// ===== 점검 모달 =====
function openMo(zid,e){
  const k=zid+'-'+e.no;curKey=k;const z=ZONES.find(z=>z.id===zid);
  document.getElementById('moBdg').style.background='var(--b)';
  document.getElementById('moNo').textContent=e.no;document.getElementById('moTon').textContent=e.t?e.t+'t':'';
  document.getElementById('moTit').textContent=e.t?e.mk+' '+e.t+'t':e.no;document.getElementById('moSub').textContent=(z?z.name:zid)+' · '+e.no;
  if(isActive(res[k])){mChk={...res[k]}}else{mChk={};CI.forEach(i=>{mChk[i.id]=i.tp==='text'?'':null})}
  renderCL();document.getElementById('chkMo').classList.add('show');
}
function renderCL(){
  const c=document.getElementById('chkList');c.innerHTML='';
  CI.forEach(i=>{const d=document.createElement('div');
    if(i.tp==='text'){d.className='mci-text';d.innerHTML=`<div class="mci-l">${i.lb}</div><textarea id="ti-${i.id}" placeholder="${i.lb}">${mChk[i.id]||''}</textarea>`}
    else{const v=mChk[i.id];d.innerHTML=`<div class="mci"><span class="mci-l">${i.lb}</span><div class="mcb"><button class="ckb ok ${v==='OK'?'on':''}" onclick="setCk('${i.id}','OK',this)">OK</button><button class="ckb ng ${v==='NG'?'on':''}" onclick="setCk('${i.id}','NG',this)">NG</button></div></div><div class="nr ${v==='NG'?'show':''}" id="nr-${i.id}"><input id="ni-${i.id}" placeholder="NG 사유" value="${mChk[i.id+'_r']||''}"></div><div class="ng-photo-row ${v==='NG'?'show':''}" id="np-${i.id}"><label>📷 발생 사진</label><button class="photo-btn" onclick="capNg('${i.id}')">촬영</button><span id="npt-${i.id}">${mChk[i.id+'_photo']?'<img class="photo-thumb" src="'+mChk[i.id+'_photo']+'" onclick="viewPhoto(this.src)">':''}</span></div>`}
    c.appendChild(d)});
}
function setCk(id,v,btn){mChk[id]=(mChk[id]===v)?null:v;const nr=document.getElementById('nr-'+id),np=document.getElementById('np-'+id);if(mChk[id]==='NG'){nr.classList.add('show');np.classList.add('show')}else{nr.classList.remove('show');np.classList.remove('show')}btn.parentElement.querySelectorAll('.ckb').forEach(b=>b.classList.remove('on'));if(mChk[id])btn.classList.add('on')}
async function capNg(id){const d=await takePhoto();if(!d)return;mChk[id+'_photo']=d;document.getElementById('npt-'+id).innerHTML=`<img class="photo-thumb" src="${d}" onclick="viewPhoto(this.src)">`}
function moAllOk(){checkItems().forEach(i=>{mChk[i.id]='OK'});renderCL()}
function moSave(){
  checkItems().forEach(i=>{if(mChk[i.id]==='NG'){const inp=document.getElementById('ni-'+i.id);if(inp)mChk[i.id+'_r']=inp.value}else{delete mChk[i.id+'_r'];delete mChk[i.id+'_photo']}});
  textItems().forEach(i=>{const ta=document.getElementById('ti-'+i.id);if(ta)mChk[i.id]=ta.value});
  const now=new Date(),ts=now.toISOString(),tm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const ds=document.getElementById('chkDate').value,ins=document.getElementById('insp').value||'-',at=ds+' '+tm;
  res[curKey]={...mChk,at,insp:ins,ts};
  const p=curKey.split(/-(.+)/),zid=p[0],no=p[1],z=ZONES.find(x=>x.id===zid),eq=z?z.equip.find(e=>e.no===no):null;
  const st=getStatus(res[curKey]);
  const h={key:curKey,b:zid,no,mk:eq?eq.mk:'',t:eq?eq.t:'',chk:{...mChk},at,insp:ins,st,ts};
  if(editIdx>=0){hist[editIdx]=h;editIdx=-1}else hist.unshift(h);
  checkItems().forEach(i=>{if(mChk[i.id]==='NG'&&!Object.values(ngReports).find(r=>r.key===curKey&&r.itemId===i.id&&r.status==='open')){
    ngReports[curKey+'_'+i.id+'_'+ts]={key:curKey,zone:zid,no,itemId:i.id,itemName:i.lb,reason:mChk[i.id+'_r']||'',photo:mChk[i.id+'_photo']||'',improvePhoto:'',improveAt:'',status:'open',createdAt:at,insp:ins}}});
  persist();persistNg();updEq(curKey);updSummary();closeMo();
}
function closeMo(){document.getElementById('chkMo').classList.remove('show');curKey=null;editIdx=-1}
document.getElementById('chkMo').addEventListener('click',function(e){if(e.target===this)closeMo()});

// ===== NG 이력 =====
function openNgHist(zid,eq){
  const k=zid+'-'+eq.no,z=ZONES.find(x=>x.id===zid);
  document.getElementById('ngNo').textContent=eq.no.length>4?eq.no.substring(0,4):eq.no;
  document.getElementById('ngSub').textContent=(z?z.name:zid)+' · '+eq.no;
  const items=Object.entries(ngReports).filter(([,r])=>r.key===k).sort((a,b)=>b[1].createdAt.localeCompare(a[1].createdAt));
  const c=document.getElementById('ngList');
  if(!items.length){c.innerHTML='<div class="ng-empty">NG 이력이 없습니다</div>'}
  else{c.innerHTML='';items.forEach(([rid,r])=>{
    const d=document.createElement('div');d.className='ng-hist-item';
    let ph='';if(r.photo)ph+=`<img src="${r.photo}" onclick="viewPhoto(this.src)">`;if(r.improvePhoto)ph+=`<img src="${r.improvePhoto}" onclick="viewPhoto(this.src)" style="border-color:var(--ok)">`;
    d.innerHTML=`<div class="nhi-top"><span class="nhi-items">${r.itemName}</span><span class="nhi-at">${r.createdAt}</span></div>${r.reason?'<div class="nhi-reason">사유: '+r.reason+'</div>':''}${ph?'<div class="nhi-photos">'+ph+'</div>':''}<span class="nhi-status ${r.status==='open'?'open':'closed'}">${r.status==='open'?'미개선':'개선완료'}</span>${r.improveAt?'<span style="font-size:10px;color:#888;margin-left:6px">'+r.improveAt+'</span>':''}${r.improveDesc?'<div style="font-size:11px;color:var(--ok);margin-top:4px;font-weight:500">개선: '+r.improveDesc+'</div>':''}<div style="display:flex;gap:4px;margin-top:6px">${r.status==='open'?`<button class="improve-btn" onclick="capImprove('${rid}')">📷 개선사진</button>`:''}<button style="padding:4px 8px;border:1.5px solid #ffcdd2;border-radius:4px;background:#fff;color:var(--ng);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit" onclick="delNgRpt('${rid}')">🗑 삭제</button></div>`;
    c.appendChild(d)})}
  document.getElementById('ngMo').classList.add('show');
}
function delNgRpt(rid){
  if(!confirm('이 NG 레포트를 삭제하시겠습니까?'))return;
  const r=ngReports[rid];delete ngReports[rid];persistNg();
  // 모달 새로고침
  const[zid,no]=r.key.split(/-(.+)/);const z=ZONES.find(x=>x.id===zid),eq=z?z.equip.find(e=>e.no===no):null;
  if(eq)openNgHist(zid,eq);else closeNgMo();
}
async function capImprove(rid){const d=await takePhoto();if(!d)return;const desc=prompt('개선내용을 입력하세요:','');if(desc===null)return;const now=new Date();ngReports[rid].improvePhoto=d;ngReports[rid].improveDesc=desc||'';ngReports[rid].improveAt=document.getElementById('chkDate').value+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');ngReports[rid].status='closed';persistNg();const r=ngReports[rid],[zid,no]=r.key.split(/-(.+)/),z=ZONES.find(x=>x.id===zid),eq=z?z.equip.find(e=>e.no===no):null;if(eq)openNgHist(zid,eq)}
function closeNgMo(){document.getElementById('ngMo').classList.remove('show')}
document.getElementById('ngMo').addEventListener('click',function(e){if(e.target===this)closeNgMo()});

function updEq(k){const el=document.getElementById('eq-'+k);if(!el)return;const r=res[k],st=getStatus(r);el.classList.remove('unc','aok','hng','prt');el.classList.add(st);const de=document.getElementById('dt-'+k);if(isActive(r)&&r.at){de.textContent=r.at.split(' ')[1];de.style.display='block'}else{de.textContent='';de.style.display='none'}}
function updSummary(){
  const T=totalEquip();let done=0,part=0,ng=0,touched=0;
  allKeys().forEach(k=>{const s=getStatus(res[k]);if(s==='aok'){done++;touched++}else if(s==='hng'){ng++;touched++}else if(s==='prt'){part++;touched++}});
  document.getElementById('smT').textContent=T;document.getElementById('smD').textContent=done;document.getElementById('smP').textContent=part;document.getElementById('smN').textContent=ng;document.getElementById('smR').textContent=T-touched;
  ZONES.forEach(z=>{let c=0;z.equip.forEach(e=>{if(getStatus(res[z.id+'-'+e.no])!=='unc')c++});const el=document.getElementById('bdg_'+z.id);if(el)el.textContent=c+'/'+z.equip.length});
  document.getElementById('cntTxt').textContent=touched+'/'+T;document.getElementById('progBar').style.width=T?Math.round(touched/T*100)+'%':'0%';document.getElementById('dlBtn').disabled=(touched===0);
}
function resetAll(){if(!confirm('전체 해제하시겠습니까?'))return;clearTime=new Date().toISOString();localStorage.setItem('CLR_TIME',clearTime);allKeys().forEach(k=>updEq(k));updSummary();showClearInfo()}

      s+=`<div class="rpt-row"><div class="rpt-label">NG사유</div><div class="rpt-val">${r.reason||'-'}</div></div>`;
      s+=`<div class="rpt-row"><div class="rpt-label">발생일시</div><div class="rpt-val">${r.createdAt}</div></div>`;
      s+=`<div class="rpt-row"><div class="rpt-label">점검자</div><div class="rpt-val">${r.insp}</div></div>`;
      if(r.improveAt)s+=`<div class="rpt-row"><div class="rpt-label">개선일시</div><div class="rpt-val">${r.improveAt}</div></div>`;
      if(r.improveDesc)s+=`<div class="rpt-row"><div class="rpt-label">개선내용</div><div class="rpt-val" style="color:#2e7d32;font-weight:500">${r.improveDesc}</div></div>`;
      // 사진
      if(r.photo||r.improvePhoto){
        s+=`<div class="rpt-photos">`;
        if(r.photo)s+=`<div class="rpt-photo-box"><img src="${r.photo}"><div class="caption">▲ 발생 (Before)</div></div>`;
        if(r.improvePhoto)s+=`<div class="rpt-photo-box"><img src="${r.improvePhoto}"><div class="caption">▲ 개선 (After)</div></div>`;
        s+=`</div>`;
      }
      s+=`</div></div>`;
    });
    return s;
  }

  html+=renderSection('미개선 NG',openNg,'h-open');
  html+=renderSection('개선완료 NG',closedNg,'h-closed');
  html+=`</body></html>`;

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`NG레포트_${date.replace(/-/g,'')}.html`;a.click();URL.revokeObjectURL(a.href);
}
init();
</script>
</body>
</html>
