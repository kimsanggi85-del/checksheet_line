<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>설비 레이아웃 점검</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--bg:#f0f2f5;--card:#fff;--b:#1565c0;--b-lt:#e3f2fd;--c:#e65100;--c-lt:#fff3e0;--f:#00695c;--f-lt:#e0f2f1;--w:#4527a0;--w-lt:#ede7f6;--ok:#2e7d32;--ok-bg:#e8f5e9;--ng:#c62828;--ng-bg:#ffebee;--part:#f57f17;--part-bg:#fffde7;--bdr:#e0e0e0}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:#212121;font-size:14px;overflow-x:hidden;padding-bottom:72px}
    .hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .hdr-top{display:flex;align-items:center;justify-content:space-between}
    .hdr h1{font-size:16px;font-weight:700;letter-spacing:.5px}
    .hdr-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;font-size:12px}
    .hdr-meta input,.hdr-meta select{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 6px;border-radius:4px;font-size:12px;font-family:inherit}
    .hdr-meta select option{color:#333;background:#fff}
    .prog-w{background:rgba(255,255,255,.2);height:3px;border-radius:2px;margin-top:6px}
    .prog-f{height:100%;background:#69f0ae;border-radius:2px;transition:width .3s;width:0%}
    .sum-bar{display:flex;gap:4px;padding:6px 10px;background:var(--card);border-bottom:1px solid var(--bdr);overflow-x:auto}
    .sc{flex:1;min-width:48px;text-align:center;padding:5px 2px;border-radius:8px;font-size:10px;font-weight:600}
    .sc-total{background:#e8eaf6;color:#283593}.sc-done{background:var(--ok-bg);color:var(--ok)}.sc-part{background:var(--part-bg);color:var(--part)}.sc-ng{background:var(--ng-bg);color:var(--ng)}.sc-rem{background:#f5f5f5;color:#777}
    .sc-v{font-size:18px;display:block;margin-top:1px;font-weight:700}
    .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--bdr);position:sticky;top:73px;z-index:90;overflow-x:auto}
    .tab{flex:1;min-width:0;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap}
    .tab.on-c{border-bottom-color:var(--c);color:var(--c)}.tab.on-b{border-bottom-color:var(--b);color:var(--b)}.tab.on-f{border-bottom-color:var(--f);color:var(--f)}.tab.on-w{border-bottom-color:var(--w);color:var(--w)}.tab.on-h{border-bottom-color:#555;color:#555}.tab.on-s{border-bottom-color:#7b1fa2;color:#7b1fa2}
    .tab .bdg{font-size:9px;padding:1px 4px;border-radius:8px;margin-left:1px;font-weight:700}
    .pnl{padding:10px 12px;display:none}.pnl.active{display:block}
    .lw{background:var(--card);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:10px;overflow:auto;-webkit-overflow-scrolling:touch}
    .lt{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
    .lt .dot{width:8px;height:8px;border-radius:50%}
    .lm{position:relative;margin:0 auto}
    .eq{position:absolute;border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:600;line-height:1.15;transition:transform .1s;border:2px solid;overflow:hidden;text-align:center;z-index:1}
    .eq:active{transform:scale(.95)}
    .eq .en{font-weight:700}.eq .ei{opacity:.8}
    .eq .ed{margin-top:1px;padding:1px 3px;border-radius:2px;background:rgba(255,255,255,.92);color:#333;white-space:nowrap}
    .eq.unc{background:#f5f5f5;border-color:#bbb;color:#777}
    .eq.aok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);box-shadow:0 1px 4px rgba(46,125,50,.2)}
    .eq.hng{background:var(--ng-bg);border-color:var(--ng);color:var(--ng);animation:png 2s infinite}
    .eq.prt{background:var(--part-bg);border-color:var(--part);color:var(--part);box-shadow:0 1px 4px rgba(245,127,23,.2)}
    @keyframes png{0%,100%{box-shadow:0 1px 4px rgba(198,40,40,.3)}50%{box-shadow:0 2px 12px rgba(198,40,40,.5)}}
    /* 그리드 레이아웃 (검사실/세척실용) */
    .grid-map{display:grid;gap:8px;padding:4px}
    .grid-eq{border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:600;line-height:1.2;transition:transform .1s;border:2px solid;text-align:center;padding:12px 8px;min-height:60px}
    .grid-eq:active{transform:scale(.97)}
    .grid-eq .en{font-size:14px;font-weight:700}.grid-eq .ei{font-size:11px;opacity:.8;margin-top:2px}
    .grid-eq .ed{font-size:10px;margin-top:3px;padding:1px 4px;border-radius:3px;background:rgba(255,255,255,.92);color:#333}
    .grid-eq.unc{background:#f5f5f5;border-color:#bbb;color:#777}
    .grid-eq.aok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);box-shadow:0 1px 4px rgba(46,125,50,.2)}
    .grid-eq.hng{background:var(--ng-bg);border-color:var(--ng);color:var(--ng);animation:png 2s infinite}
    .grid-eq.prt{background:var(--part-bg);border-color:var(--part);color:var(--part);box-shadow:0 1px 4px rgba(245,127,23,.2)}
    .legend{display:flex;gap:8px;margin-top:8px;font-size:10px;color:#888;justify-content:center;flex-wrap:wrap}
    .lg-i{display:flex;align-items:center;gap:3px}
    .lg-d{width:11px;height:11px;border-radius:3px;border:2px solid}
    .lu{background:#f5f5f5;border-color:#bbb}.lo{background:var(--ok-bg);border-color:var(--ok)}.ln{background:var(--ng-bg);border-color:var(--ng)}.lp{background:var(--part-bg);border-color:var(--part)}
    .mo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center}
    .mo.show{display:flex;animation:fi .15s}@keyframes fi{from{opacity:0}}
    .ms{background:#fff;width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:85vh;overflow-y:auto;animation:su .25s}@keyframes su{from{transform:translateY(100%)}}
    .mbar{width:36px;height:4px;background:#ccc;border-radius:2px;margin:10px auto 0}
    .mhd{padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #eee}
    .mbdg{width:44px;height:44px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
    .mbdg .mn2{font-size:17px}.mbdg .mt2{font-size:9px;opacity:.85}
    .minfo{flex:1}.minfo h3{font-size:15px;font-weight:700}.minfo p{font-size:12px;color:#888}
    .m-close{width:36px;height:36px;border:none;border-radius:50%;background:#f5f5f5;font-size:18px;cursor:pointer;color:#666;flex-shrink:0;display:flex;align-items:center;justify-content:center}.m-close:active{background:#e0e0e0}
    .mcl{padding:6px 16px 14px}
    .mci{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f5f5f5}.mci:last-child{border-bottom:none}
    .mci-l{font-size:14px;font-weight:500}.mcb{display:flex;gap:6px}
    .ckb{padding:7px 16px;border-radius:8px;border:2px solid;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s;min-width:48px}
    .ckb.ok{border-color:#c8e6c9;background:#fff;color:#66bb6a}.ckb.ok.on{background:var(--ok);color:#fff;border-color:var(--ok)}
    .ckb.ng{border-color:#ffcdd2;background:#fff;color:#ef5350}.ckb.ng.on{background:var(--ng);color:#fff;border-color:var(--ng)}
    .mft{padding:8px 16px 24px;display:flex;gap:8px}
    .mft button{flex:1;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
    .b-aok{background:var(--ok-bg);color:var(--ok);border:1.5px solid #a5d6a7}
    .b-sv{background:#1a237e;color:#fff}.b-sv:active{background:#0d1642}
    .nr{display:none;padding:3px 0 0}.nr.show{display:block}
    .nr input{width:100%;padding:6px 10px;border:1.5px solid #ffcdd2;border-radius:6px;font-size:13px;font-family:inherit;background:#fff5f5}.nr input:focus{outline:none;border-color:var(--ng)}
    .mci-text{padding:11px 0;border-bottom:1px solid #f5f5f5}.mci-text:last-child{border-bottom:none}
    .mci-text .mci-l{font-size:14px;font-weight:500;margin-bottom:6px}
    .mci-text textarea{width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;min-height:48px;background:#fafbfc}.mci-text textarea:focus{outline:none;border-color:var(--b);background:#fff}
    .hcard{background:var(--card);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:14px;margin-bottom:10px}
    .htit{font-size:14px;font-weight:700;margin-bottom:10px}
    .hempty{text-align:center;padding:20px;color:#aaa;font-size:13px}
    .hitm{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}.hitm:last-child{border-bottom:none}
    .hbdg{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;flex-shrink:0}
    .hdet{flex:1;min-width:0}.hdet .ht2{display:flex;justify-content:space-between;align-items:center}
    .hdet .heq{font-weight:600;font-size:12px}.hdet .htm{font-size:10px;color:#999}
    .hdet .hr{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
    .hchip{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600}
    .hchip.ok{background:var(--ok-bg);color:var(--ok)}.hchip.ng{background:var(--ng-bg);color:var(--ng)}.hchip.txt{background:#e3f2fd;color:var(--b)}
    .hinsp{font-size:10px;color:#888;margin-top:2px}
    .h-acts{display:flex;gap:4px;margin-top:4px}
    .h-acts button{padding:3px 8px;border:none;border-radius:4px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer}
    .ha-edit{background:#e3f2fd;color:var(--b)}.ha-del{background:#ffebee;color:var(--ng)}
    .h-clr-tag{font-size:9px;padding:1px 5px;border-radius:3px;background:#e0e0e0;color:#777;margin-left:4px}
    .h-divider{padding:6px 0;font-size:11px;color:#999;border-bottom:1px dashed #ddd;margin:4px 0;font-weight:600}
    .scard{background:var(--card);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:14px;margin-bottom:10px}
    .stit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .sitm{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f5f5f5}.sitm:last-child{border-bottom:none}
    .sitm input{flex:1;padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit}.sitm input:focus{outline:none;border-color:var(--b)}
    .sitm select{padding:6px 4px;border:1.5px solid #ddd;border-radius:6px;font-size:11px;font-family:inherit;background:#fff;color:#555}
    .sitm .s-del{width:30px;height:30px;border:none;border-radius:6px;background:#ffebee;color:var(--ng);font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0}
    .s-add-row{display:flex;gap:6px;margin-top:8px}
    .s-add-row button{flex:1;padding:9px;border:2px dashed #ccc;border-radius:8px;background:none;font-size:12px;font-weight:600;color:#999;cursor:pointer;font-family:inherit}.s-add-row button:active{background:#f5f5f5}
    .s-btns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
    .s-btns button{flex:1;min-width:70px;padding:9px;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
    .sb-save{background:var(--b);color:#fff}.sb-load{background:#f5f5f5;color:#555;border:1.5px solid #ddd}
    .sb-export{background:#e8f5e9;color:var(--ok);border:1.5px solid #a5d6a7}
    .sb-import{background:#fff3e0;color:var(--c);border:1.5px solid #ffcc80}
    input[type=file]{display:none}
    .bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:8px 12px;background:var(--card);border-top:1px solid var(--bdr);z-index:80;box-shadow:0 -2px 6px rgba(0,0,0,.06);display:flex;gap:8px}
    .bottom-bar button{flex:1;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
    .bb-dl{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;box-shadow:0 2px 6px rgba(27,94,32,.25)}
    .bb-dl:disabled{background:#bbb;box-shadow:none}.bb-dl:active:not(:disabled){transform:scale(.98)}
    .bb-reset{background:#fff;color:var(--ng);border:1.5px solid #ffcdd2;flex:0.6}.bb-reset:active{background:var(--ng-bg)}
    .reset-info{text-align:center;padding:4px 12px;font-size:11px;color:#999;background:var(--card);border-bottom:1px solid var(--bdr)}
  </style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top"><h1>🏭 설비 레이아웃 점검</h1><span id="cntTxt" style="font-size:12px;opacity:.8">0/46</span></div>
  <div class="hdr-meta"><input type="date" id="chkDate"><input type="time" id="chkTime"><select id="insp"></select></div>
  <div class="prog-w"><div class="prog-f" id="progBar"></div></div>
</div>
<div id="resetInfo" class="reset-info" style="display:none"></div>
<div class="sum-bar">
  <div class="sc sc-total">전체<span class="sc-v" id="smT">46</span></div>
  <div class="sc sc-done">완료<span class="sc-v" id="smD">0</span></div>
  <div class="sc sc-part">부분<span class="sc-v" id="smP">0</span></div>
  <div class="sc sc-ng">NG<span class="sc-v" id="smN">0</span></div>
  <div class="sc sc-rem">미점검<span class="sc-v" id="smR">46</span></div>
</div>
<div class="tabs">
  <div class="tab on-c" id="tabC" onclick="swTab('C')">C동<span class="bdg" id="bdgC" style="background:var(--c-lt);color:var(--c)">0/10</span></div>
  <div class="tab" id="tabB" onclick="swTab('B')">B동<span class="bdg" id="bdgB" style="background:var(--b-lt);color:var(--b)">0/24</span></div>
  <div class="tab" id="tabF" onclick="swTab('F')">2층검사<span class="bdg" id="bdgF" style="background:var(--f-lt);color:var(--f)">0/10</span></div>
  <div class="tab" id="tabW" onclick="swTab('W')">세척<span class="bdg" id="bdgW" style="background:var(--w-lt);color:var(--w)">0/2</span></div>
  <div class="tab" id="tabH" onclick="swTab('H')">이력</div>
  <div class="tab" id="tabS" onclick="swTab('S')">⚙</div>
</div>

<div class="pnl active" id="layC"><div class="lw"><div class="lt"><span class="dot" style="background:var(--c)"></span>C동 (10대)</div><div class="lm" id="mapC"></div></div>
  <div class="legend"><div class="lg-i"><div class="lg-d lu"></div>미점검</div><div class="lg-i"><div class="lg-d lo"></div>완료</div><div class="lg-i"><div class="lg-d lp"></div>부분</div><div class="lg-i"><div class="lg-d ln"></div>NG</div></div></div>
<div class="pnl" id="layB"><div class="lw"><div class="lt"><span class="dot" style="background:var(--b)"></span>B동 (24대)</div><div class="lm" id="mapB"></div></div>
  <div class="legend"><div class="lg-i"><div class="lg-d lu"></div>미점검</div><div class="lg-i"><div class="lg-d lo"></div>완료</div><div class="lg-i"><div class="lg-d lp"></div>부분</div><div class="lg-i"><div class="lg-d ln"></div>NG</div></div></div>
<div class="pnl" id="layF"><div class="lw"><div class="lt"><span class="dot" style="background:var(--f)"></span>2층 검사실 (10개소)</div><div class="grid-map" id="mapF" style="grid-template-columns:repeat(4,1fr)"></div></div>
  <div class="legend"><div class="lg-i"><div class="lg-d lu"></div>미점검</div><div class="lg-i"><div class="lg-d lo"></div>완료</div><div class="lg-i"><div class="lg-d lp"></div>부분</div><div class="lg-i"><div class="lg-d ln"></div>NG</div></div></div>
<div class="pnl" id="layW"><div class="lw"><div class="lt"><span class="dot" style="background:var(--w)"></span>세척실 (2개소)</div><div class="grid-map" id="mapW" style="grid-template-columns:repeat(2,1fr)"></div></div>
  <div class="legend"><div class="lg-i"><div class="lg-d lu"></div>미점검</div><div class="lg-i"><div class="lg-d lo"></div>완료</div><div class="lg-i"><div class="lg-d lp"></div>부분</div><div class="lg-i"><div class="lg-d ln"></div>NG</div></div></div>

<div class="pnl" id="layH"><div class="hcard"><div class="htit">📋 점검 이력</div><div id="histList"><div class="hempty">아직 점검 이력이 없습니다</div></div></div></div>
<div class="pnl" id="layS">
  <div class="scard"><div class="stit">🔧 점검항목 관리</div><div id="ciEditor"></div>
    <div class="s-add-row"><button onclick="addCI('check')">+ OK/NG 항목</button><button onclick="addCI('text')">+ 수기입력 항목</button></div>
    <div class="s-btns"><button class="sb-save" onclick="saveCI()">적용</button><button class="sb-load" onclick="resetCI()">기본값</button></div>
    <div class="s-btns" style="margin-top:6px"><button class="sb-export" onclick="exportCI()">TXT 저장</button><button class="sb-import" onclick="document.getElementById('ciFile').click()">TXT 불러오기</button><input type="file" id="ciFile" accept=".txt" onchange="importCI(event)"></div></div>
  <div class="scard"><div class="stit">👤 점검자 관리</div><div id="inspEditor"></div>
    <div style="margin-top:8px"><button onclick="addInsp()" style="width:100%;padding:9px;border:2px dashed #ccc;border-radius:8px;background:none;font-size:12px;font-weight:600;color:#999;cursor:pointer;font-family:inherit">+ 점검자 추가</button></div>
    <div class="s-btns"><button class="sb-save" onclick="saveInsp()">적용</button><button class="sb-load" onclick="resetInsp()">기본값</button></div>
    <div class="s-btns" style="margin-top:6px"><button class="sb-export" onclick="exportInsp()">TXT 저장</button><button class="sb-import" onclick="document.getElementById('inspFile').click()">TXT 불러오기</button><input type="file" id="inspFile" accept=".txt" onchange="importInsp(event)"></div></div>
</div>
<div class="bottom-bar">
  <button class="bb-reset" onclick="resetAll()">🔄 전체해제</button>
  <button class="bb-dl" id="dlBtn" onclick="downloadXlsx()" disabled>📥 엑셀 다운로드</button>
</div>
<div class="mo" id="chkMo">
  <div class="ms">
    <div class="mbar"></div>
    <div class="mhd">
      <div class="mbdg" id="moBdg"><span class="mn2" id="moNo"></span><span class="mt2" id="moTon"></span></div>
      <div class="minfo"><h3 id="moTit"></h3><p id="moSub"></p></div>
      <button class="m-close" onclick="closeMo()">✕</button>
    </div>
    <div class="mcl" id="chkList"></div>
    <div class="mft"><button class="b-aok" onclick="moAllOk()">전체 OK</button><button class="b-sv" onclick="moSave()">저장</button></div>
  </div>
</div>
<script>
// ===== 구역 설정 =====
const ZONES={C:'C동',B:'B동',F:'2층검사실',W:'세척실'};
const ZONE_CLR={C:'var(--c)',B:'var(--b)',F:'var(--f)',W:'var(--w)'};
const EQ={

function migrateCI(arr){return arr.map(i=>({...i,tp:i.tp||'check'}))}

function persist(){localStorage.setItem('RES',JSON.stringify(res));localStorage.setItem('HIST',JSON.stringify(hist))}
function checkItems(){return CI.filter(i=>i.tp==='check')}
function textItems(){return CI.filter(i=>i.tp==='text')}
function isActive(r){if(!r||!r.ts)return false;if(!clearTime)return true;return r.ts>clearTime}
function getStatus(r){
  if(!isActive(r))return'unc';
  const chks=checkItems(),filled=chks.filter(i=>r[i.id]==='OK'||r[i.id]==='NG');
  if(!filled.length)return'unc';if(chks.some(i=>r[i.id]==='NG'))return'hng';
  if(filled.length<chks.length)return'prt';return'aok';
}
function allKeys(){const keys=[];Object.keys(EQ).forEach(z=>EQ[z].forEach(e=>keys.push(z+'-'+e.no)));return keys}

function renderInspSel(){

  INSP.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o)});
  if(prev&&INSP.includes(prev))sel.value=prev;

  renderInspSel();

function renderMap(b,cid){
  const c=document.getElementById(cid),list=EQ[b];c.innerHTML='';
  let mx=0,my=0;list.forEach(e=>{mx=Math.max(mx,e.x+e.w);my=Math.max(my,e.y+e.h)});
  const pad=10,aw=Math.min(window.innerWidth-44,420),sc=aw/(mx+pad*2),mh=(my+pad*2)*sc;
  c.style.width=aw+'px';c.style.height=mh+'px';
  list.forEach(e=>{
    const k=b+'-'+e.no,r=res[k],st=getStatus(r),d=document.createElement('div');
    d.className='eq '+st;d.id='eq-'+k;
    d.style.cssText=`left:${(e.x+pad)*sc}px;top:${(e.y+pad)*sc}px;width:${e.w*sc}px;height:${e.h*sc}px`;
    const fs=Math.max(7,Math.min(12,e.w*sc/5));d.style.fontSize=fs+'px';
    d.onclick=()=>{editIdx=-1;openMo(b,e)};
    let dtT='',dtS='none';if(isActive(r)&&r.at){dtT=r.at.split(' ')[1];dtS='block'}
    d.innerHTML=`<span class="en" style="font-size:${Math.min(14,fs+2)}px">${e.no}</span><span class="ei">${e.t?e.t+'t':''}</span><span class="ed" id="dt-${k}" style="display:${dtS};font-size:${Math.max(6,fs-2)}px">${dtT}</span>`;
    c.appendChild(d);
  });
}

function swTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.className='tab');
  document.querySelectorAll('.pnl').forEach(x=>x.classList.remove('active'));
  const m={C:['on-c','layC'],B:['on-b','layB'],F:['on-f','layF'],W:['on-w','layW'],H:['on-h','layH'],S:['on-s','layS']};
  const[cls,pid]=m[t];document.getElementById('tab'+t).classList.add(cls);document.getElementById(pid).classList.add('active');
  if(t==='H')renderHist();
}

function openMo(zone,e){
  const k=zone+'-'+e.no;curKey=k;
  document.getElementById('moBdg').style.background=ZONE_CLR[zone]||'var(--b)';
  document.getElementById('moNo').textContent=e.no;
  document.getElementById('moTon').textContent=e.t?e.t+'t':'';
  document.getElementById('moTit').textContent=e.t?e.mk+' '+e.t+'t':e.no;
  document.getElementById('moSub').textContent=ZONES[zone]+' · '+e.no;
  if(isActive(res[k])){mChk={...res[k]}}else{mChk={};CI.forEach(i=>{mChk[i.id]=i.tp==='text'?'':null})}
  renderCL();document.getElementById('chkMo').classList.add('show');
}
function renderCL(){

function setCk(id,v,btn){mChk[id]=(mChk[id]===v)?null:v;const nr=document.getElementById('nr-'+id);mChk[id]==='NG'?nr.classList.add('show'):nr.classList.remove('show');btn.parentElement.querySelectorAll('.ckb').forEach(b=>b.classList.remove('on'));if(mChk[id])btn.classList.add('on')}
function moAllOk(){checkItems().forEach(i=>{mChk[i.id]='OK'});renderCL()}
function moSave(){
  checkItems().forEach(i=>{if(mChk[i.id]==='NG'){const inp=document.getElementById('ni-'+i.id);if(inp)mChk[i.id+'_r']=inp.value}else delete mChk[i.id+'_r']});
  textItems().forEach(i=>{const ta=document.getElementById('ti-'+i.id);if(ta)mChk[i.id]=ta.value});
  const now=new Date(),ts=now.toISOString(),timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const ds=document.getElementById('chkDate').value,ins=document.getElementById('insp').value||'-',atStr=ds+' '+timeStr;
  res[curKey]={...mChk,at:atStr,insp:ins,ts};
  const[zone,no]=curKey.split(/-(.+)/),eq=EQ[zone].find(e=>e.no===no),st=getStatus(res[curKey]);
  const hEntry={key:curKey,b:zone,no,mk:eq.mk,t:eq.t,chk:{...mChk},at:atStr,insp:ins,st,ts};
  if(editIdx>=0){hist[editIdx]=hEntry;editIdx=-1}else{hist.unshift(hEntry)}
  persist();updEq(curKey);updSummary();closeMo();

function closeMo(){document.getElementById('chkMo').classList.remove('show');curKey=null;editIdx=-1}
document.getElementById('chkMo').addEventListener('click',function(e){if(e.target===this)closeMo()});

function updEq(k){
  const el=document.getElementById('eq-'+k);if(!el)return;
  const r=res[k],st=getStatus(r);
  el.classList.remove('unc','aok','hng','prt');el.classList.add(st);
  const de=document.getElementById('dt-'+k);
  if(isActive(r)&&r.at){de.textContent=r.at.split(' ')[1];de.style.display='block'}
  else{de.textContent='';de.style.display='none'}
}

function updSummary(){
  let done=0,part=0,ngCnt=0,touched=0;
  allKeys().forEach(k=>{const st=getStatus(res[k]);if(st==='aok'){done++;touched++}else if(st==='hng'){ngCnt++;touched++}else if(st==='prt'){part++;touched++}});
  document.getElementById('smT').textContent=TOTAL;document.getElementById('smD').textContent=done;
  document.getElementById('smP').textContent=part;document.getElementById('smN').textContent=ngCnt;
  document.getElementById('smR').textContent=TOTAL-touched;
  // 구역별 배지
  Object.keys(EQ).forEach(z=>{
    let cnt=0;EQ[z].forEach(e=>{if(getStatus(res[z+'-'+e.no])!=='unc')cnt++});
    const el=document.getElementById('bdg'+z);if(el)el.textContent=cnt+'/'+EQ[z].length;
  });
  document.getElementById('cntTxt').textContent=touched+'/'+TOTAL;
  document.getElementById('progBar').style.width=Math.round(touched/TOTAL*100)+'%';
  document.getElementById('dlBtn').disabled=(touched===0);
}

function resetAll(){
  if(!confirm('전체 해제하시겠습니까?\n\n현재까지의 설비 마킹이 초기화됩니다.\n해제 이후 새로 점검하면 다시 마킹됩니다.\n이력 기록은 모두 보존됩니다.'))return;
  clearTime=new Date().toISOString();localStorage.setItem('CLR_TIME',clearTime);
  allKeys().forEach(k=>updEq(k));updSummary();showClearInfo();
}
function showClearInfo(){
  const el=document.getElementById('resetInfo');
  if(clearTime){const d=new Date(clearTime);el.textContent='마지막 해제: '+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');el.style.display='block'}
  else{el.style.display='none'}
}

function renderHist(){
  const c=document.getElementById('histList');
  if(!hist.length){c.innerHTML='<div class="hempty">아직 점검 이력이 없습니다</div>';return}
  c.innerHTML='';let prevClr=null;
  hist.forEach((h,idx)=>{
    const clr=ZONE_CLR[h.b]||'var(--b)',isClr=clearTime&&h.ts&&h.ts<=clearTime;
    if(isClr&&prevClr===false){const dv=document.createElement('div');dv.className='h-divider';const cd=new Date(clearTime);dv.textContent='── 해제 ('+cd.getFullYear()+'-'+String(cd.getMonth()+1).padStart(2,'0')+'-'+String(cd.getDate()).padStart(2,'0')+' '+String(cd.getHours()).padStart(2,'0')+':'+String(cd.getMinutes()).padStart(2,'0')+') ──';c.appendChild(dv)}
    prevClr=isClr;
    const chips=CI.map(i=>{if(i.tp==='text'){const val=h.chk[i.id];if(!val)return '';return `<span class="hchip txt">📝${val.length>8?val.substring(0,8)+'…':val}</span>`}const v=h.chk[i.id];if(!v)return '';let lb=i.lb.length>3?i.lb.substring(0,3):i.lb;if(v==='NG'&&h.chk[i.id+'_r'])lb+=':'+h.chk[i.id+'_r'];return `<span class="hchip ${v==='OK'?'ok':'ng'}">${lb} ${v}</span>`}).join('');
    const zoneName=ZONES[h.b]||h.b;
    const eqLabel=h.t?h.mk+' '+h.t+'t':h.no;
    const d=document.createElement('div');d.className='hitm';
    d.innerHTML=`<div class="hbdg" style="background:${clr}">${h.no.length>3?h.no.substring(0,3):h.no}</div><div class="hdet">
      <div class="ht2"><span class="heq">${zoneName} ${eqLabel}${isClr?'<span class="h-clr-tag">해제전</span>':''}</span><span class="htm">${h.at}</span></div>
      <div class="hr">${chips}</div><div class="hinsp">점검자: ${h.insp}</div>
      <div class="h-acts"><button class="ha-edit" onclick="editHist(${idx})">✏ 수정</button><button class="ha-del" onclick="delHist(${idx})">🗑 삭제</button></div></div>`;
    c.appendChild(d);
  });
}
function editHist(idx){
  const h=hist[idx];editIdx=idx;res[h.key]={...h.chk,at:h.at,insp:h.insp,ts:h.ts};
  const[zone,no]=h.key.split(/-(.+)/),eq=EQ[zone].find(e=>e.no===no);openMo(zone,eq);
}
function delHist(idx){
  if(!confirm('이 점검 기록을 삭제하시겠습니까?'))return;
  const h=hist[idx];hist.splice(idx,1);
  const latest=hist.find(x=>x.key===h.key&&(!clearTime||x.ts>clearTime));
  if(latest){res[h.key]={...latest.chk,at:latest.at,insp:latest.insp,ts:latest.ts}}else{delete res[h.key]}
  persist();updEq(h.key);updSummary();renderHist();
}

function renderCIEditor(){const c=document.getElementById('ciEditor');c.innerHTML='';CI.forEach((item,i)=>{const d=document.createElement('div');d.className='sitm';d.innerHTML=`<input value="${item.lb}" oninput="CI[${i}].lb=this.value"><select onchange="CI[${i}].tp=this.value"><option value="check" ${item.tp==='check'?'selected':''}>OK/NG</option><option value="text" ${item.tp==='text'?'selected':''}>수기</option></select><button class="s-del" onclick="delCI(${i})">✕</button>`;c.appendChild(d)})}
function addCI(tp){CI.push({id:'c_'+Date.now(),lb:tp==='text'?'수기항목':'새 항목',tp});renderCIEditor()}
function delCI(i){if(CI.length<=1){alert('최소 1개 항목 필요');return}CI.splice(i,1);renderCIEditor()}

function addInsp(){INSP.push('');renderInspEditor();setTimeout(()=>{const inp=document.querySelectorAll('#inspEditor input');if(inp.length)inp[inp.length-1].focus()},50)}
function delInsp(i){INSP.splice(i,1);renderInspEditor()}
function saveInsp(){const f=INSP.filter(n=>n.trim());INSP.length=0;f.forEach(n=>INSP.push(n.trim()));localStorage.setItem('INSP',JSON.stringify(INSP));renderInspSel();renderInspEditor();alert('점검자 적용 완료')}
function resetInsp(){INSP.length=0;DEFAULT_INSP.forEach(n=>INSP.push(n));localStorage.setItem('INSP',JSON.stringify(INSP));renderInspSel();renderInspEditor();alert('기본값 복원')}
function exportInsp(){dlTxt(INSP.join('\n'),'점검자목록.txt')}
function importInsp(e){loadTxt(e,lines=>{INSP.length=0;lines.forEach(n=>INSP.push(n));localStorage.setItem('INSP',JSON.stringify(INSP));renderInspSel();renderInspEditor();alert(lines.length+'명 불러옴')})}
function dlTxt(content,fn){const b=new Blob([content],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();URL.revokeObjectURL(a.href)}
function loadTxt(e,cb){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){const lines=ev.target.result.split('\n').map(l=>l.trim()).filter(l=>l);if(!lines.length){alert('유효한 내용 없음');return}cb(lines)};r.readAsText(f,'UTF-8');e.target.value=''}

function downloadXlsx(){
  const date=document.getElementById('chkDate').value,time=document.getElementById('chkTime').value,insp=document.getElementById('insp').value||'-';
  if(!insp||insp==='-'){alert('점검자를 선택해주세요.');return}
  const wb=XLSX.utils.book_new();
  const hd=['점검일자','구역','설비번호','메이커','톤수'];CI.forEach(i=>hd.push(i.lb));hd.push('상태','NG사유','점검시간','점검자');
  const rows=[];
  Object.keys(EQ).forEach(z=>{EQ[z].forEach(e=>{
    const k=z+'-'+e.no,r=res[k],act=isActive(r),ngs=[];
    const row=[act&&r.at?r.at.split(' ')[0]:'',ZONES[z],e.no,e.mk,e.t?e.t+'t':''];
    CI.forEach(i=>{if(!act){row.push('');return}if(i.tp==='text'){row.push(r[i.id]||'')}else{row.push(r[i.id]||'');if(r[i.id]==='NG'&&r[i.id+'_r'])ngs.push(i.lb+':'+r[i.id+'_r'])}});
    const stMap={aok:'완료',hng:'NG',prt:'부분체크',unc:'미점검'};row.push(stMap[getStatus(r)]||'미점검');
    row.push(ngs.join(', '));row.push(act?r.at.split(' ')[1]:'');row.push(act?r.insp:'');rows.push(row)})});
  const wd=[['설비 레이아웃 점검 체크시트'],['다운로드: '+date+' '+time,'점검자: '+insp],[],hd,...rows];
  const ws=XLSX.utils.aoa_to_sheet(wd);
  ws['!cols']=[{wch:11},{wch:10},{wch:10},{wch:8},{wch:6},...CI.map(i=>({wch:i.tp==='text'?20:8})),{wch:8},{wch:24},{wch:8},{wch:8}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:hd.length-1}}];
  XLSX.utils.book_append_sheet(wb,ws,'점검결과');
  const sm=[['점검 요약'],[],['항목','내용'],['다운로드일시',date+' '+time],['점검자',insp],[],['구역','전체','완료','부분','NG','미점검']];
  Object.keys(EQ).forEach(z=>{const list=EQ[z];let dn=0,pt=0,ng=0;list.forEach(e=>{const s=getStatus(res[z+'-'+e.no]);if(s==='aok')dn++;else if(s==='prt')pt++;else if(s==='hng')ng++});sm.push([ZONES[z],list.length,dn,pt,ng,list.length-dn-pt-ng])});
  let tDn=0,tPt=0,tNg=0;allKeys().forEach(k=>{const s=getStatus(res[k]);if(s==='aok')tDn++;else if(s==='prt')tPt++;else if(s==='hng')tNg++});
  sm.push(['합계',TOTAL,tDn,tPt,tNg,TOTAL-tDn-tPt-tNg]);
  sm.push([],['■ NG 상세 내역'],['구역','설비','항목','NG사유','점검자']);
  Object.keys(EQ).forEach(z=>EQ[z].forEach(e=>{const k=z+'-'+e.no,r=res[k];if(!isActive(r))return;checkItems().forEach(i=>{if(r[i.id]==='NG')sm.push([ZONES[z],e.no+(e.t?' '+e.mk+' '+e.t+'t':''),i.lb,r[i.id+'_r']||'',r.insp])})}));
  const ws2=XLSX.utils.aoa_to_sheet(sm);ws2['!cols']=[{wch:10},{wch:18},{wch:10},{wch:24},{wch:8}];ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:5}}];
  XLSX.utils.book_append_sheet(wb,ws2,'요약');
  const hHd=['점검일자','점검시간','구역','설비번호','메이커','톤수'];CI.forEach(i=>hHd.push(i.lb));hHd.push('상태','NG사유','점검자');
  const sorted=[...hist].sort((a,b)=>a.ts>b.ts?1:a.ts<b.ts?-1:0);
  const hRows=sorted.map(h=>{const ap=(h.at||'').split(' '),row=[ap[0]||'',ap[1]||'',ZONES[h.b]||h.b,h.no,h.mk,h.t?h.t+'t':''],ngs=[];
    CI.forEach(i=>{if(i.tp==='text'){row.push(h.chk[i.id]||'')}else{row.push(h.chk[i.id]||'');if(h.chk[i.id]==='NG'&&h.chk[i.id+'_r'])ngs.push(i.lb+':'+h.chk[i.id+'_r'])}});
    const stMap={aok:'완료',hng:'NG',prt:'부분체크',unc:''};row.push(stMap[h.st]||'');row.push(ngs.join(', '));row.push(h.insp||'');return row});
  const hwd=[['누적 점검 이력 ('+hist.length+'건)'],[],hHd,...hRows];
  const ws3=XLSX.utils.aoa_to_sheet(hwd);ws3['!cols']=[{wch:11},{wch:8},{wch:10},{wch:10},{wch:8},{wch:6},...CI.map(i=>({wch:i.tp==='text'?20:8})),{wch:8},{wch:24},{wch:8}];ws3['!merges']=[{s:{r:0,c:0},e:{r:0,c:hHd.length-1}}];
  XLSX.utils.book_append_sheet(wb,ws3,'누적이력');
  XLSX.writeFile(wb,`설비점검_${date.replace(/-/g,'')}_${time.replace(':','')}.xlsx`);
}
init();
